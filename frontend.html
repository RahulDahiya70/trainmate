<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrainMate Pro 🚆</title>

<style>

/* ===== GLOBAL ===== */
:root{
  --primary:#8A2BE2;
  --secondary:#FFBF00;
  --bg:#121212;
  --card:#1e1e1e;
  --text:#ffffff;
  --muted:#aaaaaa;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
}

/* ===== SIDEBAR ===== */
.sidebar{
  width:250px;
  background:#0d0d0d;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:20px;
}

.sidebar h2{
  color:var(--primary);
}

.room{
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  background:#1a1a1a;
}

.room:hover{
  background:var(--primary);
}

/* ===== CHAT AREA ===== */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

.header{
  padding:15px;
  background:#1a1a1a;
  display:flex;
  justify-content:space-between;
}

.chat-box{
  flex:1;
  overflow-y:auto;
  padding:15px;
  background:#181818;
}

/* ===== MESSAGES ===== */
.msg{
  padding:10px;
  margin:5px 0;
  border-radius:10px;
  max-width:70%;
}

.me{
  background:var(--primary);
  margin-left:auto;
}

.other{
  background:#333;
}

.meta{
  font-size:10px;
  color:var(--muted);
}

/* ===== INPUT ===== */
.input-area{
  display:flex;
  padding:10px;
  gap:10px;
  background:#1a1a1a;
}

input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
}

button{
  padding:10px;
  border:none;
  background:var(--primary);
  color:white;
  border-radius:10px;
  cursor:pointer;
}

/* ===== EXTRA PANELS ===== */
.emoji-panel{
  display:none;
  padding:10px;
  background:#222;
}

.emoji-panel button{
  font-size:20px;
  margin:3px;
}

/* ===== PROFILE MODAL ===== */
.modal{
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:rgba(0,0,0,0.8);
  display:flex;
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:#1e1e1e;
  padding:20px;
  border-radius:15px;
  width:300px;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>TrainMate 🚆</h2>
  <div class="room" onclick="switchRoom('general')">General</div>
  <div class="room" onclick="switchRoom('train')">Train Status</div>
  <div class="room" onclick="switchRoom('emergency')">Emergency</div>
  <div class="room" onclick="switchRoom('food')">Food</div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="header">
    <h3 id="room-name">General Chat</h3>
    <div>
      <button onclick="toggleEmoji()">😊</button>
      <button onclick="clearChat()">Clear</button>
    </div>
  </div>

  <div id="chat-box" class="chat-box"></div>

  <div id="emoji" class="emoji-panel">
    <button onclick="emoji('😀')">😀</button>
    <button onclick="emoji('😂')">😂</button>
    <button onclick="emoji('🚆')">🚆</button>
    <button onclick="emoji('🔥')">🔥</button>
    <button onclick="emoji('🙏')">🙏</button>
  </div>

  <div class="input-area">
    <input id="msg" placeholder="Type message">
    <button onclick="send()">Send</button>
  </div>

</div>

<!-- PROFILE -->
<div id="modal" class="modal">
  <div class="modal-box">
    <h3>Enter Details</h3>
    <input id="name" placeholder="Name"><br><br>
    <input id="train" placeholder="Train No"><br><br>
    <button onclick="saveUser()">Start Chat</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = typeof io !== "undefined" ? io() : null;

let username = "";
let train = "";
let room = "general";

const chat = document.getElementById("chat-box");

function saveUser(){
  username = document.getElementById("name").value || "Guest";
  train = document.getElementById("train").value || "Unknown";

  document.getElementById("modal").style.display="none";
}

function add(msg,type){
  const div=document.createElement("div");
  div.className="msg "+type;
  div.innerHTML = msg + `<div class='meta'>${new Date().toLocaleTimeString()}</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function send(){
  let text=document.getElementById("msg").value;
  if(!text) return;

  add(text,"me");

  if(socket){
    socket.emit("chat",{user:username,msg:text,room});
  }

  document.getElementById("msg").value="";
}

if(socket){
  socket.on("chat",(data)=>{
    if(data.user!==username){
      add(data.user+": "+data.msg,"other");
    }
  });
}

function switchRoom(r){
  room=r;
  document.getElementById("room-name").innerText=r.toUpperCase();
  chat.innerHTML="";
}

function toggleEmoji(){
  let e=document.getElementById("emoji");
  e.style.display = e.style.display==="block"?"none":"block";
}

function emoji(e){
  document.getElementById("msg").value += e;
}

function clearChat(){
  chat.innerHTML="";
}

/* ===== EXTRA FEATURES ===== */

// typing indicator
document.getElementById("msg").addEventListener("input",()=>{
  if(socket) socket.emit("typing",username);
});

if(socket){
  socket.on("typing",(u)=>{
    console.log(u+" typing...");
  });
}

// notification
function notify(text){
  if(Notification.permission==="granted"){
    new Notification(text);
  }
}

if(Notification.permission!=="granted"){
  Notification.requestPermission();
}

// fake analytics
function logActivity(action){
  console.log("User Action:",action);
}

// keyboard enter
document.getElementById("msg").addEventListener("keypress",(e)=>{
  if(e.key==="Enter") send();
});

</script>

</body>
</html>
